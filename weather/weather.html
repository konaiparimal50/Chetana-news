<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Widget</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link rel="stylesheet" href="weather.css">
</head>
<body>

<div class="weather-widget" id="weatherWidget">

  <div class="widget-loader" id="widgetLoader">
    <div class="spinner"></div>
    <p>Loading weather data...</p>
  </div>

  <div class="widget-content" id="widgetContent" hidden>

    <section class="current-weather">
      <div class="current-weather__top">
        <div class="location">
          <i class="fa-solid fa-location-dot"></i>
          <span id="cityName">Kolkata</span>
        </div>
        <div class="date" id="currentDate">June 24, 2026 | Tuesday</div>
      </div>

      <div class="current-weather__main">
        <div class="main-info">
          <div class="weather-icon" id="currentIcon">☁️</div>
          <div class="temp-block">
            <div class="temp">
              <span id="currentTemp">31</span><sup>°</sup><span class="temp-unit">C</span>
            </div>
            <div class="desc" id="currentDesc">Broken clouds</div>
          </div>
        </div>

        <div class="divider"></div>

        <div class="detail-list">
          <div class="detail-item">
            <i class="fa-solid fa-cloud-showers-heavy"></i>
            <div>
              <div class="detail-label">Chance of Rain</div>
              <div class="detail-value" id="rainChance">70%</div>
            </div>
          </div>
          <div class="detail-item">
            <i class="fa-solid fa-droplet"></i>
            <div>
              <div class="detail-label">Humidity</div>
              <div class="detail-value" id="humidity">85%</div>
            </div>
          </div>
          <div class="detail-item">
            <i class="fa-solid fa-wind"></i>
            <div>
              <div class="detail-label">Wind Speed</div>
              <div class="detail-value" id="windSpeed">12 km/h</div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="forecast">
      <div class="forecast-card">
        <h2 class="forecast-title">5-Day Forecast</h2>

        <div class="forecast-scroll-wrap">
          <div class="forecast-list" id="forecastList">
            </div>
        </div>

        <button class="details-btn" id="detailsBtn">
          <i class="fa-solid fa-cloud-sun"></i>
          <span>View Detailed Forecast</span>
          <i class="fa-solid fa-arrow-right"></i>
        </button>
      </div>
    </section>

  </div>
</div>


<script src="script.js"></script>
</body>
</html>
